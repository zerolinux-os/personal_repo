# ============================================================
# ZeroLinux - Calamares Settings
# ============================================================

modules-search: [ local, /usr/lib/calamares/modules ]

instances:
- id:     rootfs
  module: unpackfs
  config: unpackfs1.conf
  weight: 30
- id:     vmlinuz
  module: unpackfs
  config: unpackfs2.conf
  weight: 1
- id:     before
  module: shellprocess
  config: shellprocess-before.conf
- id:     final
  module: shellprocess
  config: shellprocess-final.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs@rootfs
  - unpackfs@vmlinuz
  - machineid
  - locale
  - keyboard
  - localecfg
  - luksbootkeyfile
  - luksopenswaphookcfg
  - fstab
  - networkcfg
  - shellprocess@before
  - initcpiocfg
  - initcpio
  - hwclock
  - removeuser
  - users
  - displaymanager
  - ucode
  - grubcfg
  - bootloader
  - shellprocess@final
  - preservefiles
  - umount
- show:
  - finished

branding: zerolinux
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
