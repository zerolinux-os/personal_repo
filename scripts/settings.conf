# ============================================================
# ZeroLinux - Calamares Main Settings
# ============================================================

---
# اسم مجلد العلامة التجارية
branding: zerolinux

# تشغيل المثبّت مع صلاحيات الـ root تلقائياً
prompt-install: false

# وضع التصحيح
debug: false

# -------- قائمة وحدات التثبيت (بالترتيب) --------
sequence:

  # --- مرحلة العرض (الصفحات) ---
  - show:
    - welcome          # صفحة الترحيب + اختيار اللغة
    - locale           # المنطقة الزمنية وإعدادات المنطقة
    - keyboard         # إعداد لوحة المفاتيح
    - partition        # تقسيم القرص الصلب
    - users            # إنشاء المستخدم وكلمة المرور
    - summary          # ملخص قبل التثبيت

  # --- مرحلة التنفيذ (التثبيت الفعلي) ---
  - exec:
    - partition        # تطبيق التقسيم
    - mount            # تركيب أقسام القرص
    - unpackfs         # فك ضغط الـ squashfs
    - machineid        # توليد machine-id
    - fstab            # إنشاء /etc/fstab
    - locale           # تطبيق إعدادات اللغة
    - keyboard         # تطبيق لوحة المفاتيح
    - localecfg        # إعداد locale.conf
    - luksbootkeyfile  # مفتاح LUKS (اختياري)
    - initramfs        # بناء initramfs
    - grubcfg          # إعداد ملف grub
    - bootloader       # تثبيت bootloader
    - users            # إنشاء المستخدمين
    - displaymanager   # إعداد SDDM
    - networkcfg       # تهيئة الشبكة
    - hwclock          # ضبط ساعة الجهاز
    - services-systemd # تفعيل الخدمات
    - packages         # إزالة حزم الـ Live
    - zerolinux-post   # سكريبت ما بعد التثبيت
    - umount           # فصل الأقسام

  # --- مرحلة النهاية ---
  - show:
    - finished         # رسالة النجاح

# -------- وحدات إضافية (تحميلها من مسارات أخرى) --------
modules-search:
  - local
  - /usr/lib/calamares/modules

# -------- الإعدادات الافتراضية --------
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
hide-back-and-next-during-exec: false
quit-at-end: false
